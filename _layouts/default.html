<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<script>
  // Set the theme before first paint to avoid a flash of the wrong theme.
  (function () {
    try {
      var t = localStorage.getItem("theme");
      if (t === "dark" || (!t && matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.classList.add("dark");
      }
    } catch (e) {}
  })();
</script>

  <div class="wrap footer-grid">
    <div>

        <strong><a href="/about/">Tom Ashworth</a></strong><br />

    <div>
      <p>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme"><span id="theme-icon">☽</span><span id="theme-label" class="visually-hidden">Dark</span></button>
      </p>
    </div>
  </div>
</footer>

<script>
  (function () {
    var prefersDark = matchMedia("(prefers-color-scheme: dark)");

    function update() {
      var dark = document.documentElement.classList.contains("dark");
      var icon = document.getElementById("theme-icon");
      var label = document.getElementById("theme-label");
      if (icon) icon.textContent = dark ? "☀" : "☽";
      if (label) label.textContent = dark ? "Light" : "Dark";
    }
    update();

    // Follow the system preference until an explicit choice is made.
    prefersDark.addEventListener("change", function (e) {
      if (!localStorage.getItem("theme")) {
        document.documentElement.classList.toggle("dark", e.matches);
        update();
      }
    });

    function burst(el, char, color) {
      if (matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      var rect = el.getBoundingClientRect();
      var cx = rect.left + rect.width / 2;
      var cy = rect.top + rect.height / 2;
      for (var i = 0; i < 12; i++) {
        var s = document.createElement("span");
        s.textContent = char;
        s.style.cssText = "position:fixed;pointer-events:none;font-size:" + (8 + Math.random() * 10) + "px;left:" + cx + "px;top:" + cy + "px;color:" + color + ";z-index:9999;";
        document.body.appendChild(s);
        var angle = (Math.PI * 2 * i) / 12 + (Math.random() - 0.5) * 0.5;
        var dist = 30 + Math.random() * 40;
        var dx = Math.cos(angle) * dist;
        var dy = Math.sin(angle) * dist - 20;
        s.animate([
          { transform: "translate(-50%,-50%) scale(1)", opacity: 1 },
          { transform: "translate(calc(-50% + " + dx + "px), calc(-50% + " + dy + "px)) scale(0)", opacity: 0 }
        ], { duration: 1200 + Math.random() * 600, easing: "cubic-bezier(.15,.85,.35,1)", fill: "forwards" });
        (function (n) { setTimeout(function () { n.remove(); }, 2000); })(s);
      }
    }

    document.addEventListener("click", function (e) {
      var tog = e.target.closest("#theme-toggle");
      if (!tog) return;
      var wasDark = document.documentElement.classList.contains("dark");
      burst(tog, wasDark ? "☽" : "☀", wasDark ? "#d36e5b" : "#facc15");
      document.documentElement.classList.toggle("dark");
      localStorage.setItem("theme", document.documentElement.classList.contains("dark") ? "dark" : "light");
      update();
    });
  })();
</script>
